<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>404 — Page not found · Aetheris Studio</title>
    <style>
      html { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #080b0f;
        color: #ede7da;
        font-family: Georgia, serif;
      }
      main {
        width: min(760px, 86vw);
        padding: 8vh 0;
        border-block: 1px solid rgba(237, 231, 218, .25);
      }
      small,
      a {
        font-family: Arial, sans-serif;
        text-transform: uppercase;
        letter-spacing: .12em;
      }
      h1 {
        margin: .25em 0;
        font-size: clamp(58px, 12vw, 144px);
        line-height: .82;
      }
      p {
        max-width: 520px;
        color: #b9c7dc;
        font: 18px/1.6 Arial, sans-serif;
      }
      a {
        display: inline-block;
        margin-top: 2rem;
        color: #a9c9ff;
        text-underline-offset: .35em;
      }
    </style>
  </head>
  <body>
    <main>
      <small>Aetheris Studio · 404</small>
      <h1>Page not found.</h1>
      <p>The page or file you requested does not exist or has moved.</p>
      <a href="/">Return to the studio ↗</a>
    </main>
  </body>
</html>
