<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <filter id="grain" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="3" seed="17" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="0.34" intercept="0.33"/>
      <feFuncG type="linear" slope="0.34" intercept="0.33"/>
      <feFuncB type="linear" slope="0.34" intercept="0.33"/>
      <feFuncA type="table" tableValues="0 0.48"/>
    </feComponentTransfer>
  </filter>
  <rect width="192" height="192" filter="url(#grain)" opacity="0.28"/>
</svg>
